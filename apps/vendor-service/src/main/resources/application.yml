spring:
  application:
    name: vendor-service
  profiles:
    active: loc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lagu_vendor}
    username: ${DB_USERNAME:lagu}
    password: ${DB_PASSWORD:lagu}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: vendor-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.lagu.platform.*"

server:
  port: ${SERVER_PORT:8107}

platform:
  record-service.url: ${RECORD_SERVICE_URL:http://record-service:8101}
  metadata-service.url: ${METADATA_SERVICE_URL:http://metadata-service:8103}
  iam-service.url: ${IAM_SERVICE_URL:http://iam-service:8080}

management:
  endpoints.web.exposure.include: health,info,prometheus
  endpoint.health.show-details: always
