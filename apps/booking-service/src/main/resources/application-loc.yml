spring:
  config:
    activate:
      on-profile: loc

  datasource:
    url: jdbc:postgresql://localhost:5435/platformdb
    username: postgres
    password: postgres
    hikari:
      schema: booking

  flyway:
    schemas: booking
    default-schema: booking

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: booking

  kafka:
    bootstrap-servers: localhost:9092

platform:
  listing-service.url: http://localhost:8108
  metadata-service.url: http://localhost:8103

server:
  port: 8109

logging:
  level:
    com.lagu.platform: DEBUG
