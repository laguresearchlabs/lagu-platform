spring:
  flyway:
    schemas: metadata
    default-schema: metadata
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: metadata
  datasource:
    hikari:
      schema: metadata

# Disable the seeder in tests — seed data pollutes assertion checks
platform:
  seeder:
    enabled: false

logging:
  level:
    org.flywaydb: WARN
    org.hibernate.SQL: WARN
    org.springframework.kafka: WARN
