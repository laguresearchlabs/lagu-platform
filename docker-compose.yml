services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platformdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: platform-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: platform-kafdrop
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── OpenSearch (Phase 4) ───────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: platform-opensearch
    profiles: [search, full]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: platform-opensearch-dashboards
    profiles: [search, full]
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  # ── Observability ──────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: platform-otel-collector
    profiles: [observability, full]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: platform-prometheus
    profiles: [observability, full]
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.5.0
    container_name: platform-grafana
    profiles: [observability, full]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

  # ── Applications ───────────────────────────────────────────────────────────
  # EUREKA_SERVER_URL defaults to host.docker.internal:8761 — this standalone stack has
  # no registry-service. Registration is non-fatal if unreachable; point it at the real
  # registry-service when running alongside the full server-scripts stack.
  record-service:
    build:
      context: .
      dockerfile: apps/record-service/Dockerfile
    container_name: platform-record
    profiles: [apps, full]
    ports:
      - "8101:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: record-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started

  workflow-service:
    build:
      context: .
      dockerfile: apps/workflow-service/Dockerfile
    container_name: platform-workflow
    profiles: [apps, full]
    ports:
      - "8102:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: workflow-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    container_name: platform-search
    profiles: [search, full]
    ports:
      - "8103:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OTEL_SERVICE_NAME: search-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      record-service:
        condition: service_started

  automation-service:
    build:
      context: .
      dockerfile: apps/automation-service/Dockerfile
    container_name: platform-automation
    profiles: [apps, full]
    ports:
      - "8104:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: automation-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: platform-notification
    profiles: [apps, full]
    ports:
      - "8105:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      PLATFORM_EMAIL_ENABLED: ${PLATFORM_EMAIL_ENABLED:-false}
      PLATFORM_EMAIL_DRY_RUN: ${PLATFORM_EMAIL_DRY_RUN:-true}
      PLATFORM_EMAIL_FROM: ${PLATFORM_EMAIL_FROM:-noreply@lagu.platform}
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  document-service:
    build:
      context: .
      dockerfile: apps/document-service/Dockerfile
    container_name: platform-document
    profiles: [apps, full]
    ports:
      - "8106:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: document-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  schema-registry:
    build:
      context: .
      dockerfile: apps/schema-registry/Dockerfile
    container_name: platform-schema-registry
    profiles: [apps, full]
    ports:
      - "8107:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PLATFORM_SEEDER_ENABLED: "true"
      OTEL_SERVICE_NAME: schema-registry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  vendor-service:
    build:
      context: .
      dockerfile: apps/vendor-service/Dockerfile
    container_name: platform-vendor
    profiles: [apps, full]
    ports:
      - "8108:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      DB_URL: jdbc:postgresql://postgres:5432/platformdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP: kafka:9092
      SERVER_PORT: 8080
      SPRING_FLYWAY_SCHEMAS: vendor
      SPRING_DATASOURCE_HIKARI_SCHEMA: vendor
      OTEL_SERVICE_NAME: vendor-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      record-service:
        condition: service_started

  listing-service:
    build:
      context: .
      dockerfile: apps/listing-service/Dockerfile
    container_name: platform-listing
    profiles: [apps, full]
    ports:
      - "8109:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://host.docker.internal:8761/eureka}
      SPRING_PROFILES_ACTIVE: docker
      PLATFORM_GATEWAY_SHARED_SECRET: ${PLATFORM_GATEWAY_SHARED_SECRET:-CHANGE_ME_INSECURE_DEFAULT_SECRET_ROTATE_IN_PROD}
      DB_URL: jdbc:postgresql://postgres:5432/platformdb
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP: kafka:9092
      SERVER_PORT: 8080
      SPRING_FLYWAY_SCHEMAS: listing
      SPRING_DATASOURCE_HIKARI_SCHEMA: listing
      OTEL_SERVICE_NAME: listing-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      record-service:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  opensearch-data:
  prometheus-data:
  grafana-data:
