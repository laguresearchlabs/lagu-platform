global:
  scrape_interval: 15s

scrape_configs:
  - job_name: schema-registry
    static_configs:
      - targets: ['schema-registry:8080']
    metrics_path: /actuator/prometheus

  - job_name: record-service
    static_configs:
      - targets: ['record-service:8080']
    metrics_path: /actuator/prometheus

  - job_name: workflow-service
    static_configs:
      - targets: ['workflow-service:8080']
    metrics_path: /actuator/prometheus

  - job_name: search-service
    static_configs:
      - targets: ['search-service:8080']
    metrics_path: /actuator/prometheus

  - job_name: automation-service
    static_configs:
      - targets: ['automation-service:8080']
    metrics_path: /actuator/prometheus

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
